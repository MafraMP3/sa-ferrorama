<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/images/icon.png">

  <title>Sensores</title>


</head>

<body>

  <main>

    <!--==================================================Sidebar=====================================================//-->
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <button class="hamburger" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="sidebar container">
      <div id="logocontainer">
        <img src="assets/images/logo-quadrada.png " alt="logo">
      </div>

      <a href="home.html" id="linkDashboard">
        <i class="fa-solid fa-house" style="color: #fff;"></i> Dashboard
      </a>

      <a href="#" class="active" id="linkSensores">
        <i class="fa-solid fa-satellite-dish" style="color: #fff;"></i> Sensores
      </a>


      <a href="monitoramento.html" id="linkMonitoramento">
        <i class="fa-solid fa-chart-line" style="color: #fff;"></i> Monitoramento
      </a>

      <a href="#" class="logout" id="linkSair">SAIR</a>
    </div>
    <!--==================================================Sidebar=====================================================//-->

    <div class="content">

      <div class="card div-top-sensors">

        <div class="d-flex align-items-center">
          <img class="img-sensor-icon" src="assets/images/icon-sensor-logo.png" alt="">
          <h4 class="text-cadastrar-novo-sensor">CADASTRAR NOVO SENSOR</h4>
        </div>

        <div id="div-forms-sensors">
          <form action="" id="formSensor">
            <div id="div-form-cadastrarsensor" class="d-flex">
              <div class="div-inputs-label-sensors">
                <label class="d-block label-form-sensors" for="">NOME DO SENSOR</label>
                <input class="form-control input-form-sensors" type="text" placeholder="EX: Sensor KL-I32"
                  id="nomeSensor" required>
              </div>
              <div class="div-inputs-label-sensors">
                <label class="d-block label-form-sensors" for="">LOCALIZAÇÃO</label>
                <input class="form-control input-form-sensors" type="text" placeholder="EX: Km 67" id="localSensor"
                  required>
              </div>
              <div class="div-inputs-label-sensors">
                <label class=" label-form-sensors" for="">TIPO DE DADO</label>
                <select class="form-select input-form-sensors" aria-label="Default select example" id="tipoSensor">
                  <option selected disabled value="">Selecione o tipo</option>
                  <option value="Velocidade">Velocidade</option>
                  <option value="Temperatura">Temperatura</option>
                  <option value="Energia">Energia</option>
                </select>
              </div>
              <div id="div-button-sensors">
                <button class="d-block btn btn-primary button-form-sensors" type="submit">Cadastrar</button>
              </div>
            </div>
          </form>
        </div>

      </div>

    </div>



    <div class="container" id="delete-sensor-part">
      <div class="d-flex">
        <div id="div-img-delete-sensors">
          <img id="img-delete-sensors" src="assets/images/Lixo.png" alt="">
        </div>
        <div>
          <h4>Deseja Excluir o sensor?</h4>
          <div class="d-flex">
            <button onclick="excluirLinha()">sim</button>
            <button onclick="tirarTela()">não</button>
          </div>
        </div>
      </div>
    </div>



    <div class="content">
      <div class="card div-tabela-sensors ">

        <div class="d-flex align-items-center">
          <img class="img-sensor-icon" src="assets/images/icone-tabela-sensor.png" alt="">
          <h4 class="text-cadastrar-novo-sensor">SENSORES CADASTRADOS</h4>
        </div>

        <div class="table-responsive">
          <table id="tabelaSensores" class="table table-bordered align-middle rounded overflow-hidden border-dark ">
            <thead>
              <tr class="table-dark ">
                <th class="ths">ID sensor</th>
                <th class="ths">Localização</th>
                <th class="ths">Tipo Dado</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>?</td>
                <td>?</td>
                <td>?</td>
                <td>?</td>
                <td class="img-tabela" style="width: 10%;">
                  <button class="botao-imagem" ><img src="assets/images/Lixo.png" class="icone-lixo"></button>
                  <button class="botao-imagem" ><img src="assets/images/Olho.png" class="icone-olho"></button>
                </td>
              </tr>
        </div>
      </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="scripts/script.js"></script>
</body>

</html>
