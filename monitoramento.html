<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/images/icon.png">

    <title>Monitoramento</title>
</head>

<body>

    <!--==================================================Sidebar=====================================================//-->
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <button class="hamburger" onclick="toggleSidebar()">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="sidebar container">
        <div id="logocontainer">
            <img src="assets/images/logo-quadrada.png " alt="logo">
        </div>

        <a href="home.html" id="linkDashboard">
            <i class="fa-solid fa-house" style="color: #fff;"></i> Dashboard
        </a>

        <a href="sensores.html" id="linkSensores">
            <i class="fa-solid fa-satellite-dish" style="color: #fff;"></i> Sensores
        </a>

        <a href="#" id="linkMonitoramento" class="active">
            <i class="fa-solid fa-chart-line" style="color: #fff;"></i> Monitoramento
        </a>

        <a href="usuarios.html" id="linkUsuarios">
            <i class="fa-solid fa-users" style="color: rgb(255, 255, 255);"></i> Usuários
        </a>

        <a href="#" class="logout" id="linkSair">SAIR</a>
    </div>
    <!--==================================================Sidebar=====================================================//-->


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <div class="content">
        <div class="card div-top-monitor">

           <section id="section-navbar-monitor" class="d-flex justify-content-between align-items-center px-4 py-3">
                <div>
                    <p class="text-monitor-sensor mb-0">Sensor 2</p>
                    <p class="text-muted small mb-0" style="color: rgba(255,255,255,0.5) !important;">Acompanhe os dados e o histórico em tempo real.</p>
                </div>
                <span class="badge rounded-pill border border-success text-success px-3 py-2">
                    <i class="fa-solid fa-circle me-1" style="font-size: 8px;"></i> ONLINE
                </span>
            </section>
            <section id="section-contex-monitor">

                <div>
                    <div class="navbar-sections-context">
                        <p>dados</p>
                    </div>
                    <div class="d-flex div-section-context-monitor">
                        <div>

                            <div class="row g-3">
                            <div class="col-6">
                                <div class="card p-3">
                                    <p class="text-muted small mb-1">Velocidade Atual</p>
                                    <h3 class="mb-0 fw-bold" id="velAtual">—</h3>
                                    <span class="text-muted" style="font-size: 11px;">km/h</span>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card p-3">
                                    <p class="text-muted small mb-1">Velocidade Máxima</p>
                                    <h3 class="mb-0 fw-bold" id="velMax">—</h3>
                                    <span class="text-muted" style="font-size: 11px;">km/h</span>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card p-3">
                                    <p class="text-muted small mb-1">Velocidade Média</p>
                                    <h3 class="mb-0 fw-bold" id="mediaSensores">—</h3>
                                    <span class="text-muted" style="font-size: 11px;">km/h</span>
                                </div>
                            </div>
                            </div>
                        </div>
                    </div>
                </div>


                <div>
                    <div class="navbar-sections-context">
                        <p>historico</p>
                    </div>
                    <div class="d-flex div-section-context-monitor">

                        <div class="responsive grafico">
                            <canvas id="grafico"></canvas>
                        </div>
                    </div>
                </div>


            </section>

        </div>

    </div>







    <!--oiiiiiiiiiiiii-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="scripts/script.js"></script>

</body>

</html>
