<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="assets/images/icon.png">

    <title>Usuários</title>
</head>
<body>

    <main>

    <!--==================================================Sidebar=====================================================//-->
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <button class="hamburger" onclick="toggleSidebar()" >
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="sidebar container">
      <div id="logocontainer">
        <img src="assets/images/logo-quadrada.png " alt="logo">
      </div>

      <a href="home.html" id="linkDashboard">
        <i class="fa-solid fa-house" style="color: #fff;"></i> Dashboard
      </a>

      <a href="sensores.html"  id="linkSensores">
        <i class="fa-solid fa-satellite-dish" style="color: #fff;"></i> Sensores
      </a>

      <a href="monitoramento.html" id="linkMonitoramento">
        <i class="fa-solid fa-chart-line" style="color: #fff;"></i> Monitoramento
      </a>

      <a href="#" class="active" id="linkUsuarios">
        <i class="fa-solid fa-users" style="color: rgb(255, 255, 255);"></i></i> Usuários
      </a>

      <a href="#" class="logout" id="linkSair">SAIR</a>
    </div>
    <!--==================================================Sidebar=====================================================//-->

    <div class="content">

      <div class="card div-top-sensors">

        <div class="d-flex align-items-center">
          <i class="fa-solid fa-circle-plus fa-2x" style="color: rgb(255, 49, 49);"></i>
          <p class="text-cadastrar-novo-sensor h4">ADICIONAR NOVO USUÁRIO</p>
        </div>

        <div id="div-forms-sensors">
          <form action="" id="formUsuarios">
            <div id="div-form-cadastrarsensor" class="d-flex">
              <div class="div-inputs-label-sensors">
                <label class="d-block label-form-sensors" for="">NOME COMPLETO</label>
                <input class="form-control input-form-sensors" type="text" placeholder="EX: Carlos"
                  id="nomeUsuario" required>
              </div>
              <div class="div-inputs-label-sensors">
                <label class="d-block label-form-sensors" for="">EMAIL</label>
                <input class="form-control input-form-sensors" type="text" placeholder="EX: Carlos@gmail.com" id="emailUsuario"
                  required>
              </div>
              <div class="div-inputs-label-sensors">
                <label class="d-block label-form-sensors" for="">FUNÇÃO / CARGO</label>
                <input class="form-control input-form-sensors" type="text" placeholder="EX: Marceneiro" id="cargoUsuario"
                  required>
              </div>
              <div class="div-inputs-label-sensors">
                <label class="d-block label-form-sensors" for="">SENHA</label>
                <input class="form-control input-form-sensors" type="password" placeholder="EX: 1234" id="senhaUsuario"
                  required>
              </div>
              <div id="div-button-sensors">
                <button class="d-block btn btn-primary button-form-sensors" type="submit">Cadastrar</button>
              </div>
            </div>
          </form>
        </div>

      </div>

    </div>

    

    <!---------Tela de deletar Sensor--------->
    <div class="container" id="delete-sensor-part">
      <div class="d-flex">
        <div id="div-img-delete-sensors">
          <img id="img-delete-sensors" src="assets/images/Lixo.png" alt="">
        </div>
        <div id="div-context-delete-sensor">
          <h4 id="text-delete-sensor" >Deseja Excluir o sensor?</h4>
          <div class="d-flex">
            <button class="button-delete-sensor" onclick="excluirLinha()">Sim</button>
            <button class="button-delete-sensor" onclick="tirarTela()">Não</button>
          </div>
        </div>
      </div>
    </div>


    <div class="content" id="nenhumUsuario">
     <div class="card div-top-sensors d-flex  align-items-center justify-content-center " >
        <i class="fa-solid fa-users-slash fa-5x m-4 text-danger opacity-50"></i>
        <h4 class="text-secondary">
          Nenhum usuário cadastrado ainda.
        </h4>
        <p class="text-secondary mb-4">Cadastre um novo usuário para começar.</p>
      </div>
      </div>

  </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="scripts/script.js"></script>
</body>
</html>
